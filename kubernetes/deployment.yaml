apiVersion: apps/v1
kind: Deployment
metadata:
  name: secret-reader
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secret-reader
  template:
    metadata:
      labels:
        app: secret-reader
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: workload-identity-sa
      containers:
        - name: reader
          image: busybox:1.36
          command: ["/bin/sh","-c"]
          args:
            - "while true; do echo 'Secret contents:'; cat /mnt/secrets-store/demo-secret; sleep 10; done"
          volumeMounts:
            - name: secrets-store
              mountPath: "/mnt/secrets-store"
              readOnly: true
      volumes:
        - name: secrets-store
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "kv-secrets"